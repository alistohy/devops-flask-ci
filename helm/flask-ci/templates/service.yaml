apiVersion: v1
kind: Service
metadata:
  name: {{ include "flask-ci.fullname" . }}-service
spec:
  selector:
    app: {{ include "flask-ci.name" . }}
  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      nodePort: {{ .Values.service.nodePort }}
  type: {{ .Values.service.type }}
